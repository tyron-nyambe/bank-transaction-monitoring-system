<!DOCTYPE html>
<html>
<head>
    <title>Fraud Monitoring Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; background-color: #f9f9f9; }
        h1 { color: #333; }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f4f4f4; }
        tr:hover {
         background-color: #f1f1f1;
}

        .high { color: red; font-weight: bold; }
        .medium { color: orange; font-weight: bold; }
        .low { color: green; font-weight: bold; }
    </style>
</head>
<body>

<h1>🚨 Fraud Monitoring Dashboard</h1>

<input type="text" id="accountId" placeholder="Enter Account ID" />
<button onclick="loadAlerts()">Search</button>

<!-- KPI Cards -->
<div class="row">
    <div class="card"><h3>Total Alerts</h3><p id="totalAlerts">0</p></div>
    <div class="card"><h3>High Risk Alerts</h3><p id="highRiskAlerts">0</p></div>
    <div class="card"><h3>Accounts Flagged</h3><p id="accountsFlagged">0</p></div>
</div>

<!-- Charts -->
<div class="row">
    <div class="card">
        <h3>Risk Distribution</h3>
        <canvas id="riskChart"></canvas>
    </div>

    <div class="card">
        <h3>Alerts Over Time</h3>
        <canvas id="timeChart"></canvas>
    </div>
</div>

<!-- Alerts Table -->
<div class="card">
    <h3>Alerts</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Account</th>
                <th>Rule</th>
                <th>Risk Score</th>
                <th>Risk Level</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="alertsTable"></tbody>
    </table>
</div>

<!-- High Risk Accounts -->
<div class="card">
    <h3>High Risk Accounts</h3>
    <table>
        <thead>
            <tr>
                <th>Account</th>
                <th>Total Alerts</th>
                <th>Total Risk Score</th>
                <th>Risk Level</th>
            </tr>
        </thead>
        <tbody id="accountsTable"></tbody>
    </table>
</div>

<script>
let riskChart, timeChart;

async function loadAlerts() {
    const accountId = document.getElementById("accountId").value;

    let url = "http://localhost:5245/api/alerts";
    if (accountId) {
        url = `http://localhost:5245/api/alerts/by-account/${accountId}`;
    }

    try {
        const response = await fetch(url);
        const data = await response.json();

        // KPIs
        document.getElementById("totalAlerts").innerText = data.length;

        const highRisk = data.filter(a => a.riskLevel === "High").length;
        document.getElementById("highRiskAlerts").innerText = highRisk;

        renderTable(data);
        renderCharts(accountId);

    } catch (err) {
        console.error(err);
        alert("API connection failed");
    }
}

function renderTable(data) {
    const table = document.getElementById("alertsTable");
    table.innerHTML = "";

    data.forEach(alert => {
        table.innerHTML += `
        <tr>
        <td>${alert.id}</td>
        <td>${alert.accountId}</td>
        <td>${alert.ruleName}</td>
        <td>${alert.riskScore}</td>
        <td class="${(alert.riskLevel || '').toLowerCase()}">${alert.riskLevel}</td>
        <td>${new Date(alert.createdAt).toLocaleString()}</td>
    </tr>
        `;
    });
}

async function loadHighRiskAccounts() {
    const response = await fetch("http://localhost:5245/api/analytics/high-risk-accounts");
    const data = await response.json();

    document.getElementById("accountsFlagged").innerText = data.length;

    const table = document.getElementById("accountsTable");
    table.innerHTML = "";

    data.forEach(acc => {
        table.innerHTML += `
            <tr>
                <td>${acc.accountId}</td>
                <td>${acc.totalAlerts}</td>
                <td>${acc.totalRiskScore}</td>
                <td class="${acc.riskLevel.toLowerCase()}">${acc.riskLevel}</td>
            </tr>
        `;
    });
}

async function renderCharts(accountId) {

    let riskUrl = `http://localhost:5245/api/analytics/risk-distribution`;
    if (accountId) riskUrl += `?accountId=${accountId}`;

    const riskData = await (await fetch(riskUrl)).json();

    if (riskChart) riskChart.destroy();
    riskChart = new Chart(document.getElementById("riskChart"), {
        type: "pie",
        data: {
            labels: riskData.map(x => x.riskLevel),
            datasets: [{ data: riskData.map(x => x.count) }]
        }
    });

    let timeUrl = `http://localhost:5245/api/analytics/alerts-per-day`;
    if (accountId) timeUrl += `?accountId=${accountId}`;

    const timeData = await (await fetch(timeUrl)).json();

    if (timeChart) timeChart.destroy();
    timeChart = new Chart(document.getElementById("timeChart"), {
        type: "line",
        data: {
            labels: timeData.map(x => x.date),
            datasets: [{
                label: "Alerts",
                data: timeData.map(x => x.count)
            }]
        }
    });
}

// Load initial
loadAlerts();
loadHighRiskAccounts();
//Auto refresh
setInterval(loadAlerts, 15000);
</script>

</body>
</html>
